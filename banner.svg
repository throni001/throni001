<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <rect width="900" height="300" fill="url(#bg)"/>

  <circle cx="200" cy="150" r="120" fill="url(#glow1)" opacity="0.4" filter="url(#blur2)">
    <animateTransform attributeName="transform" type="translate" values="0,0;30,-20;0,0" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="100" r="100" fill="url(#glow2)" opacity="0.35" filter="url(#blur2)">
    <animateTransform attributeName="transform" type="translate" values="0,0;-25,15;0,0" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="200" r="80" fill="#a78bfa" opacity="0.2" filter="url(#blur1)">
    <animateTransform attributeName="transform" type="translate" values="0,0;20,10;0,0" dur="6s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.3">
    <circle cx="100" cy="50" r="3" fill="#c4b5fd">
      <animate attributeName="cy" values="50;30;50" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="80" r="2" fill="#67e8f9">
      <animate attributeName="cy" values="80;50;80" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="40" r="4" fill="#a78bfa">
      <animate attributeName="cy" values="40;20;40" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="60" r="2" fill="#7dd3fc">
      <animate attributeName="cy" values="60;35;60" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="90" r="3" fill="#c4b5fd">
      <animate attributeName="cy" values="90;60;90" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="220" r="2" fill="#67e8f9">
      <animate attributeName="cy" values="220;200;220" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="250" r="3" fill="#a78bfa">
      <animate attributeName="cy" values="250;230;250" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="200" r="2" fill="#7dd3fc">
      <animate attributeName="cy" values="200;180;200" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g opacity="0.15">
    <ellipse cx="450" cy="320" rx="500" ry="40" fill="#7c3aed">
      <animate attributeName="rx" values="500;520;500" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="450" cy="330" rx="450" ry="25" fill="#3b82f6">
      <animate attributeName="rx" values="450;470;450" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="450" cy="340" rx="400" ry="15" fill="#06b6d4">
      <animate attributeName="rx" values="400;420;400" dur="6s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g opacity="0.08">
    <rect x="0" y="280" width="900" height="3" fill="#a78bfa">
      <animate attributeName="x" values="-100;800;-100" dur="12s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
